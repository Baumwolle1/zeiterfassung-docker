<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <title>{{ app_title }}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
  </head>
  <body>
    {% block content %}{% endblock %}
    <script>
      history.scrollRestoration = "manual";
      const scrollKey = `zeiterfassung-scroll:${location.pathname}`;

      const restoreScroll = () => {
        const saved = sessionStorage.getItem(scrollKey);
        if (!saved) return;
        requestAnimationFrame(() => requestAnimationFrame(() => window.scrollTo(0, Number(saved))));
      };

      const rememberScroll = () => {
        sessionStorage.setItem(scrollKey, String(window.scrollY));
      };

      window.addEventListener("scroll", rememberScroll, { passive: true });
      document.addEventListener("visibilitychange", () => {
        if (document.visibilityState === "hidden") rememberScroll();
      });
      window.addEventListener("load", restoreScroll);
      window.addEventListener("beforeunload", rememberScroll);
      document.addEventListener("click", (event) => {
        const trigger = event.target.closest("a, button");
        if (trigger) rememberScroll();
      });
      document.addEventListener("submit", rememberScroll);

      document.querySelectorAll("[data-time-input]").forEach((input) => {
        input.addEventListener("input", () => {
          const digits = input.value.replace(/\D/g, "").slice(0, 4);
          input.value = digits.length > 2 ? `${digits.slice(0, 2)}:${digits.slice(2)}` : digits;
        });
      });
    </script>
  </body>
  </html>
